name: GearRL Certified Research Checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: base
          python-version: "3.11"
          auto-activate-base: false
      - name: Create hash-locked scientific environment
        shell: bash -l {0}
        run: |
          conda create --yes --name ai --file environment-ai.lock
          conda run -n ai python -m pip install --require-hashes --only-binary=:all: --requirement requirements-ai-pip.txt
      - name: Run release verification
        shell: bash -l {0}
        run: conda run -n ai make release-verify
